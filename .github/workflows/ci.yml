name: CI

on:
  push:
  pull_request:

jobs:
  node-and-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust brain
        run: cargo check --manifest-path evertext_brain/Cargo.toml

      - name: Test Rust brain
        run: cargo test --manifest-path evertext_brain/Cargo.toml
